name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Import signing certificate
        if: ${{ env.CERT_BASE64 != '' }}
        env:
          CERT_BASE64: ${{ secrets.MAC_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
        run: |
          echo "$CERT_BASE64" | base64 --decode > /tmp/cert.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain

      - name: Build Electron (macOS)
        run: npx electron-builder --mac dmg --publish never
        env:
          CSC_LINK: /tmp/cert.p12
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: purroxy-mac
          path: release/*.dmg
          retention-days: 30

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Build Electron (Windows)
        run: npx electron-builder --win nsis --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: purroxy-win
          path: release/*.exe
          retention-days: 30

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Build Electron (Linux)
        run: npx electron-builder --linux AppImage --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: purroxy-linux
          path: release/*.AppImage
          retention-days: 30

  release:
    needs: [build-mac, build-win, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.AppImage" \) | while read f; do
            cp "$f" .
          done
          shasum -a 256 *.dmg *.exe *.AppImage > checksums.txt 2>/dev/null || true
          cat checksums.txt

      - name: Generate SLSA attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'artifacts/checksums.txt'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/**/*.AppImage
            artifacts/checksums.txt
          generate_release_notes: true

      - name: Upload to DO Spaces
        env:
          DO_SPACES_KEY: ${{ secrets.DO_SPACES_KEY }}
          DO_SPACES_SECRET: ${{ secrets.DO_SPACES_SECRET }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq s3cmd

          cat > ~/.s3cfg << EOF
          [default]
          access_key = $DO_SPACES_KEY
          secret_key = $DO_SPACES_SECRET
          host_base = nyc3.digitaloceanspaces.com
          host_bucket = %(bucket)s.nyc3.digitaloceanspaces.com
          EOF

          VERSION="${GITHUB_REF#refs/tags/}"

          find artifacts -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.AppImage" \) | while read f; do
            BASENAME=$(basename "$f")
            s3cmd put "$f" "s3://purroxy-releases/${VERSION}/${BASENAME}" --acl-public
            s3cmd put "$f" "s3://purroxy-releases/latest/${BASENAME}" --acl-public
          done

          # Upload checksums
          s3cmd put artifacts/checksums.txt "s3://purroxy-releases/${VERSION}/checksums.txt" --acl-public
          s3cmd put artifacts/checksums.txt "s3://purroxy-releases/latest/checksums.txt" --acl-public

      - name: Update version.json
        env:
          DO_SPACES_KEY: ${{ secrets.DO_SPACES_KEY }}
          DO_SPACES_SECRET: ${{ secrets.DO_SPACES_SECRET }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"

          cat > ~/.s3cfg << EOF
          [default]
          access_key = $DO_SPACES_KEY
          secret_key = $DO_SPACES_SECRET
          host_base = nyc3.digitaloceanspaces.com
          host_bucket = %(bucket)s.nyc3.digitaloceanspaces.com
          EOF

          echo "{\"version\":\"${VERSION}\",\"date\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"dmg\":\"Purroxy-${VERSION}-arm64.dmg\",\"exe\":\"Purroxy Setup ${VERSION}.exe\",\"appimage\":\"Purroxy-${VERSION}.AppImage\"}" > /tmp/version.json

          s3cmd put /tmp/version.json "s3://purroxy-releases/latest/version.json" --acl-public -m "application/json"
